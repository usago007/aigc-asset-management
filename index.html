<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIGC 数字资产管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var isFileProtocol = window.location.protocol === 'file:';
        var isProjectRootEntry = /\/index\.html$/.test(window.location.pathname)
          && !/\/dist\/index\.html$/.test(window.location.pathname);
        if (isFileProtocol && isProjectRootEntry) {
          var redirected = new URLSearchParams(window.location.search).get('redirected');
          if (!redirected) {
            var target = new URL('./dist/index.html?redirected=1', window.location.href);
            window.location.replace(target.href);
            return;
          }
        }

        var theme = null;
        try {
          theme = localStorage.getItem('theme');
        } catch (error) {
          theme = null;
        }
        if (!theme || (theme !== 'light' && theme !== 'dark')) {
          theme = 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
