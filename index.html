<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FatMug AIGC 数字资产管理平台，用于 AI 内容创作、项目协作、资产治理与生产效能分析。" />
    <meta name="theme-color" content="#f6f5f2" />
    <meta property="og:title" content="FatMug · AIGC 数字资产管理" />
    <meta property="og:description" content="从创意生成到资产沉淀的一体化 AI 内容生产工作台。" />
    <meta property="og:type" content="website" />
    <title>AIGC 数字资产管理</title>
    <script>
      (function() {
        var isFileProtocol = window.location.protocol === 'file:';
        var isProjectRootEntry = /\/index\.html$/.test(window.location.pathname)
          && !/\/dist\/index\.html$/.test(window.location.pathname);
        if (isFileProtocol && isProjectRootEntry) {
          var redirected = new URLSearchParams(window.location.search).get('redirected');
          if (!redirected) {
            var target = new URL('./dist/index.html?redirected=1', window.location.href);
            window.location.replace(target.href);
            return;
          }
        }

        var theme = null;
        try {
          theme = localStorage.getItem('theme');
        } catch (error) {
          theme = null;
        }
        if (!theme || (theme !== 'light' && theme !== 'dark')) {
          theme = 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
